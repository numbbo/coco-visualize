name: Build wheels

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build Python packages
        run: uv build

      - name: Archive wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/cocoviz*.whl
